name: Auto EUserv

on:
  schedule:
    - cron: "0 12 16 * *" # 每月 16 号 UTC 时间 12:00 运行

  workflow_dispatch:

permissions:
  contents: write # 让内置 GITHUB_TOKEN 能 push 回仓库（运行记录 + keepalive）

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9" # 指定Python3.x

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run script
        id: run
        continue-on-error: true # 续期失败也不阻断后面的记录与 keepalive
        env:
          EUSERV_USERNAME: ${{ secrets.EUSERV_USERNAME }}
          EUSERV_PASSWORD: ${{ secrets.EUSERV_PASSWORD }}
          TRUECAPTCHA_USERID: ${{ secrets.TRUECAPTCHA_USERID }}
          TRUECAPTCHA_APIKEY: ${{ secrets.TRUECAPTCHA_APIKEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_USER_ID: ${{ secrets.TG_USER_ID }}
          IMAP_SERVER: ${{ secrets.IMAP_SERVER }}
          MAIL_ADDRESS: ${{ secrets.MAIL_ADDRESS }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          set -o pipefail
          python Github_Action.py 2>&1 | tee /tmp/run.log

      - name: Append run record & keepalive commit
        if: always() # 无论续期成功/失败，都写记录并提交，重置 60 天活动计时器
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          {
            echo ""
            echo "## $(date -u +%FT%TZ) | renewal: ${{ steps.run.outcome }}"
            # 追加本次输出的最后 15 行，过滤掉可能含密钥的行
            grep -vaEi 'token|password|passwd|apikey|api_key|secret|authorization|bearer|app_password|cookie' /tmp/run.log 2>/dev/null | tail -n 15 || true
          } >> RUNS.log
          git add RUNS.log
          git commit --allow-empty -m "chore: run record (${{ steps.run.outcome }}) $(date -u +%FT%TZ)"
          git push origin HEAD:${{ github.event.repository.default_branch }}
